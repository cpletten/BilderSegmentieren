<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PiCar Tester</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a; color: #e8e8e8;
  font-family: monospace;
  height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
}
#camWrap { position: relative; flex: 1; overflow: hidden; background: #111; }
video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
#arrowPanel {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.grid { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px); gap: 4px; }
.btn {
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px; font-size: 28px; color: #fff;
  background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.15);
  transition: background .1s, transform .1s;
}
.btn.active { background: rgba(0,220,120,0.9); border-color: #00ff88; transform: scale(1.1); }
.empty { background: transparent !important; border-color: transparent !important; }
#bar {
  padding: 10px 14px; background: #111; border-top: 1px solid #222;
  display: flex; gap: 14px; align-items: center;
}
.s { display: flex; flex-direction: column; align-items: center; }
.sl { font-size: 9px; color: #555; letter-spacing:.06em; }
.sv { font-size: 14px; font-weight: 700; }
#startBtn {
  margin-left: auto; padding: 8px 18px;
  background: #00dc78; color: #000;
  border: none; border-radius: 8px;
  font-family: monospace; font-size: 13px; font-weight: 700; cursor: pointer;
}
#startBtn.on { background: #ff4d4d; color: #fff; }
#msg {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.82); color: #e8e8e8;
  padding: 12px 20px; border-radius: 8px; font-size: 13px; text-align: center;
  max-width: 85%; line-height: 1.5;
}
</style>
</head>
<body>
<div id="camWrap">
  <video id="v" autoplay playsinline muted></video>
  <canvas id="c"></canvas>
  <div id="arrowPanel">
    <div class="grid">
      <div class="empty btn"></div>
      <div class="btn" id="aF">↑</div>
      <div class="empty btn"></div>
      <div class="btn" id="aL">←</div>
      <div class="btn" id="aS">■</div>
      <div class="btn" id="aR">→</div>
      <div class="empty btn"></div>
      <div class="btn" id="aB">↓</div>
      <div class="empty btn"></div>
    </div>
  </div>
  <div id="msg">Kamera-Zugriff erlauben,<br>dann START drücken</div>
</div>
<div id="bar">
  <div class="s"><span class="sl">LINKS</span><span class="sv" id="vL">—</span></div>
  <div class="s"><span class="sl">MITTE</span><span class="sv" id="vM">—</span></div>
  <div class="s"><span class="sl">RECHTS</span><span class="sv" id="vR">—</span></div>
  <div class="s"><span class="sl">FPS</span><span class="sv" id="vF" style="color:#00dc78">—</span></div>
  <div class="s"><span class="sl">ENTSCHEID</span><span class="sv" id="vA" style="color:#ffb020">—</span></div>
  <button id="startBtn" onclick="toggle()">START</button>
</div>

<script>
const SZ=128, THR=0.40, ES=0.30;
const LAB={fwd:'VOR',left:'LINKS',right:'RECHTS',bwd:'RÜCK'};
const vid=document.getElementById('v');
const can=document.getElementById('c');
const cx=can.getContext('2d');
const msg=document.getElementById('msg');
const AR={
  fwd:  document.getElementById('aF'),
  left: document.getElementById('aL'),
  right:document.getElementById('aR'),
  bwd:  document.getElementById('aB'),
  stop: document.getElementById('aS')
};
let run=false, aid=null, fps=0, lt=0;
const off=document.createElement('canvas');
off.width=off.height=SZ;
const ox=off.getContext('2d');

navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
  .then(s=>{ vid.srcObject=s; msg.textContent='Kamera bereit – START drücken'; })
  .catch(e=>{ msg.textContent='Kamera-Fehler:\n'+e.message; });

function depth(data){
  const res=new Float32Array(SZ*SZ);
  for(let r=0;r<SZ;r++) for(let c=0;c<SZ;c++){
    const i=(r*SZ+c)*4;
    const R=data[i],G=data[i+1],B=data[i+2];
    const br=(R+G+B)/(3*255);
    const sat=(Math.max(R,G,B)-Math.min(R,G,B))/(Math.max(R,G,B)+1);
    const rf=1-(r/SZ)*0.5;
    res[r*SZ+c]=br*0.5+sat*0.2+rf*0.3;
  }
  return res;
}

function decide(d){
  const r0=Math.floor(SZ*ES), t=Math.floor(SZ/3);
  let sl=0,sm=0,sr=0,n=(SZ-r0)*t;
  for(let r=r0;r<SZ;r++){
    for(let c=0;c<t;c++)     sl+=d[r*SZ+c];
    for(let c=t;c<2*t;c++)   sm+=d[r*SZ+c];
    for(let c=2*t;c<SZ;c++)  sr+=d[r*SZ+c];
  }
  sl/=n; sm/=n; sr/=n;
  let a;
  if(sm>THR)                  a='fwd';
  else if(sl>=sr&&sl>THR-0.1) a='left';
  else if(sr>sl&&sr>THR-0.1)  a='right';
  else                        a='bwd';
  return{a,sl,sm,sr};
}

function draw(sl,sm,sr){
  can.width=can.offsetWidth||300;
  can.height=can.offsetHeight||300;
  const W=can.width, H=can.height;
  cx.clearRect(0,0,W,H);
  const t=Math.floor(W/3), rs=Math.floor(H*ES);
  [[sl,[255,100,60]],[sm,[60,220,120]],[sr,[60,140,255]]].forEach(([s,[r,g,b]],i)=>{
    cx.fillStyle=`rgba(${r},${g},${b},${Math.min(0.4,s*0.6)})`;
    cx.fillRect(i*t,rs,t,H-rs);
    cx.strokeStyle=`rgba(${r},${g},${b},0.5)`;
    cx.lineWidth=1; cx.strokeRect(i*t,rs,t,H-rs);
    cx.fillStyle=`rgba(${r},${g},${b},1)`;
    cx.font='bold 13px monospace'; cx.textAlign='center';
    cx.fillText((s*100).toFixed(0)+'%', i*t+t/2, H-10);
  });
  cx.strokeStyle='rgba(255,255,255,0.2)'; cx.lineWidth=1;
  cx.setLineDash([4,4]);
  cx.beginPath(); cx.moveTo(0,rs); cx.lineTo(W,rs); cx.stroke();
  cx.setLineDash([]);
}

function frame(){
  if(!run) return;
  const now=performance.now();
  if(lt>0) fps=fps*.85+(1000/(now-lt))*.15;
  lt=now;
  if(vid.readyState>=2){
    ox.drawImage(vid,0,0,SZ,SZ);
    const id=ox.getImageData(0,0,SZ,SZ);
    const d=depth(id.data);
    const{a,sl,sm,sr}=decide(d);
    draw(sl,sm,sr);
    Object.values(AR).forEach(x=>x.classList.remove('active'));
    if(AR[a]) AR[a].classList.add('active');
    document.getElementById('vL').textContent=(sl*100).toFixed(0)+'%';
    document.getElementById('vM').textContent=(sm*100).toFixed(0)+'%';
    document.getElementById('vR').textContent=(sr*100).toFixed(0)+'%';
    document.getElementById('vF').textContent=fps.toFixed(1);
    document.getElementById('vA').textContent=LAB[a]||a;
  }
  aid=requestAnimationFrame(frame);
}

function toggle(){
  const b=document.getElementById('startBtn');
  run=!run;
  if(run){
    b.textContent='STOP'; b.classList.add('on');
    msg.textContent=''; lt=0; frame();
  } else {
    b.textContent='START'; b.classList.remove('on');
    cancelAnimationFrame(aid);
    Object.values(AR).forEach(x=>x.classList.remove('active'));
    cx.clearRect(0,0,can.width,can.height);
    msg.textContent='Gestoppt';
  }
}
</script>
</body>
</html>
